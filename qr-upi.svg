<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#ffffff" rx="12"/>

  <!-- Border -->
  <rect x="4" y="4" width="292" height="292" rx="10" fill="none" stroke="#e2eaf3" stroke-width="2"/>

  <!-- ── Top-left finder pattern ── -->
  <rect x="20" y="20" width="70" height="70" rx="6" fill="#1a80e0"/>
  <rect x="30" y="30" width="50" height="50" rx="3" fill="#ffffff"/>
  <rect x="38" y="38" width="34" height="34" rx="2" fill="#1a80e0"/>

  <!-- ── Top-right finder pattern ── -->
  <rect x="210" y="20" width="70" height="70" rx="6" fill="#1a80e0"/>
  <rect x="220" y="30" width="50" height="50" rx="3" fill="#ffffff"/>
  <rect x="228" y="38" width="34" height="34" rx="2" fill="#1a80e0"/>

  <!-- ── Bottom-left finder pattern ── -->
  <rect x="20" y="210" width="70" height="70" rx="6" fill="#1a80e0"/>
  <rect x="30" y="220" width="50" height="50" rx="3" fill="#ffffff"/>
  <rect x="38" y="228" width="34" height="34" rx="2" fill="#1a80e0"/>

  <!-- ── Timing strips (horizontal + vertical) ── -->
  <rect x="100" y="105" width="8" height="8" fill="#1a80e0"/>
  <rect x="116" y="105" width="8" height="8" fill="#1a80e0"/>
  <rect x="132" y="105" width="8" height="8" fill="#1a80e0"/>
  <rect x="148" y="105" width="8" height="8" fill="#1a80e0"/>
  <rect x="164" y="105" width="8" height="8" fill="#1a80e0"/>
  <rect x="180" y="105" width="8" height="8" fill="#1a80e0"/>
  <rect x="196" y="105" width="8" height="8" fill="#1a80e0"/>

  <rect x="105" y="100" width="8" height="8" fill="#1a80e0"/>
  <rect x="105" y="116" width="8" height="8" fill="#1a80e0"/>
  <rect x="105" y="132" width="8" height="8" fill="#1a80e0"/>
  <rect x="105" y="148" width="8" height="8" fill="#1a80e0"/>
  <rect x="105" y="164" width="8" height="8" fill="#1a80e0"/>
  <rect x="105" y="180" width="8" height="8" fill="#1a80e0"/>
  <rect x="105" y="196" width="8" height="8" fill="#1a80e0"/>

  <!-- ── Data module dots (pseudo-random pattern) ── -->
  <!-- row 1 -->
  <rect x="120" y="120" width="8" height="8" fill="#1a80e0"/>
  <rect x="136" y="120" width="8" height="8" fill="#1a80e0"/>
  <rect x="160" y="120" width="8" height="8" fill="#1a80e0"/>
  <rect x="176" y="120" width="8" height="8" fill="#1a80e0"/>
  <rect x="200" y="120" width="8" height="8" fill="#1a80e0"/>
  <!-- row 2 -->
  <rect x="128" y="136" width="8" height="8" fill="#1a80e0"/>
  <rect x="152" y="136" width="8" height="8" fill="#1a80e0"/>
  <rect x="184" y="136" width="8" height="8" fill="#1a80e0"/>
  <!-- row 3 -->
  <rect x="120" y="152" width="8" height="8" fill="#1a80e0"/>
  <rect x="144" y="152" width="8" height="8" fill="#1a80e0"/>
  <rect x="168" y="152" width="8" height="8" fill="#1a80e0"/>
  <rect x="192" y="152" width="8" height="8" fill="#1a80e0"/>
  <!-- row 4 -->
  <rect x="136" y="168" width="8" height="8" fill="#1a80e0"/>
  <rect x="160" y="168" width="8" height="8" fill="#1a80e0"/>
  <rect x="200" y="168" width="8" height="8" fill="#1a80e0"/>
  <!-- row 5 -->
  <rect x="120" y="184" width="8" height="8" fill="#1a80e0"/>
  <rect x="152" y="184" width="8" height="8" fill="#1a80e0"/>
  <rect x="176" y="184" width="8" height="8" fill="#1a80e0"/>
  <!-- row 6 -->
  <rect x="128" y="200" width="8" height="8" fill="#1a80e0"/>
  <rect x="144" y="200" width="8" height="8" fill="#1a80e0"/>
  <rect x="168" y="200" width="8" height="8" fill="#1a80e0"/>
  <rect x="192" y="200" width="8" height="8" fill="#1a80e0"/>
  <!-- scattered extras -->
  <rect x="216" y="136" width="8" height="8" fill="#1a80e0"/>
  <rect x="224" y="152" width="8" height="8" fill="#1a80e0"/>
  <rect x="216" y="168" width="8" height="8" fill="#1a80e0"/>
  <rect x="208" y="184" width="8" height="8" fill="#1a80e0"/>
  <rect x="224" y="200" width="8" height="8" fill="#1a80e0"/>

  <!-- UPI label at bottom -->
  <text x="150" y="262" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700"
        fill="#1a80e0" text-anchor="middle" letter-spacing="2">UPI</text>
  <text x="150" y="280" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="400"
        fill="#6a8faa" text-anchor="middle">Replace with your QR code</text>
</svg>
